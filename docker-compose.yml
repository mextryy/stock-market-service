services:
  database:
    image: redis:alpine
    restart: always

  app-1:
    build: .
    environment:
      - REDIS_HOST=database
    depends_on:
      - database

  app-2:
    build: .
    environment:
      - REDIS_HOST=database
    depends_on:
      - database

  proxy:
    image: nginx:latest
    ports:
      - "${PORT}:80"  #dynamically mapped port from the startup script
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2